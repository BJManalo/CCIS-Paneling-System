<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCIS Paneling System - Schedule</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="icon" type="image/jpeg" href="../../assets/images/ua_logo_official.png">
    <style>
        .role-filter-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 99px;
            border: 1px solid #e2e8f0;
            background: white;
            color: #64748b;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Outfit', sans-serif;
        }

        .role-filter-btn:hover {
            background: #f8fafc;
            color: var(--primary-dark);
        }

        .role-filter-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .role-filter-btn .material-icons-round {
            font-size: 18px;
        }
    </style>
</head>

<body class="dashboard-body">

    <div class="dashboard-container">
        <!-- Header -->
        <header class="dashboard-header"
            style="justify-content: space-between; align-items: center; padding-top: 20px;">
            <img src="../../assets/images/ua_logo_official.png" alt="Logo" class="admin-logo" style="width: 50px; height: 50px;">

            <div class="search-bar" style="max-width: 600px; width: 100%; margin: 0 20px;">
                <span class="material-icons-round">search</span>
                <input type="text" placeholder="Search..." id="searchInput" style="background: #f1f5f9; border: none;">
            </div>

            <button class="logout-btn" onclick="logout()">
                <span class="material-icons-round">logout</span>
                Log Out
            </button>
        </header>

        <!-- Role Context Tabs -->
        <div style="display: flex; gap: 15px; margin: 25px 0 10px 0; padding-left: 20px;">
            <button class="role-filter-btn active" onclick="switchRole('Panel')" id="role-Panel">
                <span class="material-icons-round">groups</span>
                Panel
            </button>
            <button class="role-filter-btn" onclick="switchRole('Adviser')" id="role-Adviser">
                <span class="material-icons-round">school</span>
                Adviser
            </button>
        </div>

        <!-- Title -->
        <h2 class="page-title">Defense Schedule</h2>

        <!-- Calendar View -->
        <div id="calendarView" class="calendar-container"
            style="background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; overflow: hidden; animation: fadeIn 0.3s ease; margin-top: 10px; margin-bottom: 30px;">
            <div class="calendar-header"
                style="padding: 25px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center;">
                <h3 id="calendarMonth" style="margin: 0; color: #1e293b; font-weight: 700; font-size: 1.4rem;">Month
                    Year</h3>
                <div style="display: flex; gap: 10px;">
                    <button onclick="prevMonth()"
                        style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 8px; cursor: pointer; color: #475569; transition: all 0.2s;">
                        <span class="material-icons-round">chevron_left</span>
                    </button>
                    <button onclick="nextMonth()"
                        style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 8px; cursor: pointer; color: #475569; transition: all 0.2s;">
                        <span class="material-icons-round">chevron_right</span>
                    </button>
                </div>
            </div>
            <div class="calendar-grid-header"
                style="display: grid; grid-template-columns: repeat(7, 1fr); background: #f8fafc; padding: 12px 0; border-bottom: 1px solid #f1f5f9;">
                <div style="text-align: center; color: #94a3b8; font-weight: 700; font-size: 0.75rem; text-transform: uppercase;">Sun</div>
                <div style="text-align: center; color: #94a3b8; font-weight: 700; font-size: 0.75rem; text-transform: uppercase;">Mon</div>
                <div style="text-align: center; color: #94a3b8; font-weight: 700; font-size: 0.75rem; text-transform: uppercase;">Tue</div>
                <div style="text-align: center; color: #94a3b8; font-weight: 700; font-size: 0.75rem; text-transform: uppercase;">Wed</div>
                <div style="text-align: center; color: #94a3b8; font-weight: 700; font-size: 0.75rem; text-transform: uppercase;">Thu</div>
                <div style="text-align: center; color: #94a3b8; font-weight: 700; font-size: 0.75rem; text-transform: uppercase;">Fri</div>
                <div style="text-align: center; color: #94a3b8; font-weight: 700; font-size: 0.75rem; text-transform: uppercase;">Sat</div>
            </div>
            <div id="calendarDays" class="calendar-grid"
                style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #f1f5f9;">
                <!-- Days injected by JS -->
            </div>
        </div>



    </div>





    <nav class="bottom-nav">
        <a href="panel_capstone.html" class="nav-item">
            <span class="material-icons-round">folder_special</span>
            <span class="nav-label">Capstone</span>
        </a>
        <a href="panel_evaluation.html" class="nav-item">
            <span class="material-icons-round">rate_review</span>
            <span class="nav-label">Evaluation</span>
        </a>
        <a href="panel_schedule.html" class="nav-item active">
            <span class="material-icons-round">calendar_today</span>
            <span class="nav-label">Schedule</span>
        </a>
        <a href="panel_accounts.html" class="nav-item">
            <span class="material-icons-round">people</span>
            <span class="nav-label">Accounts</span>
        </a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../assets/js/shared.js"></script>
    <script src="panel_schedule.js"></script>
</body>

</html>
